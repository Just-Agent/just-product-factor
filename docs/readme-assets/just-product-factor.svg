<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">just-product-factor logo</title>
  <desc id="desc">A compact abstract router mark with checklist lines, colored skill nodes, and a product review check path.</desc>
  <defs>
    <linearGradient id="bg" x1="64" x2="448" y1="64" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e7fff7"/>
    </linearGradient>
    <linearGradient id="panel" x1="120" x2="392" y1="92" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="route" x1="130" x2="382" y1="262" y2="166" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.52" stop-color="#10a37f"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect x="42" y="42" width="428" height="428" rx="108" fill="url(#bg)"/>
  <circle cx="386" cy="120" r="44" fill="#38bdf8" opacity="0.15"/>
  <circle cx="128" cy="382" r="58" fill="#10b981" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="104" y="86" width="304" height="340" rx="62" fill="url(#panel)"/>
    <rect x="144" y="126" width="154" height="164" rx="34" fill="#f8fafc"/>
    <path d="M178 170h78" stroke="#111827" stroke-width="14" stroke-linecap="round"/>
    <path d="M178 206h98" stroke="#111827" stroke-width="14" stroke-linecap="round"/>
    <path d="M178 242h58" stroke="#111827" stroke-width="14" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M136 318c48 0 72-40 112-40s56-64 126-64" stroke="url(#route)" stroke-width="18"/>
    <path d="M142 250c25 0 39 18 55 48 23-59 62-96 122-112" stroke="#2dd4bf" stroke-width="20"/>
  </g>

  <g filter="url(#shadow)">
    <circle cx="136" cy="318" r="24" fill="#22d3ee"/>
    <circle cx="248" cy="278" r="24" fill="#10b981"/>
    <circle cx="374" cy="214" r="24" fill="#84cc16"/>
    <circle cx="318" cy="186" r="18" fill="#f8fafc"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="258" y="292" width="112" height="76" rx="28" fill="#f8fafc"/>
    <path d="M286 331l18 18 40-42" fill="none" stroke="#10a37f" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
