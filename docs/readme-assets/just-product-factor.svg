<svg xmlns="http://www.w3.org/2000/svg" width="960" height="260" viewBox="0 0 960 260" role="img" aria-labelledby="title desc">
  <title id="title">just-product-factor wordmark</title>
  <desc id="desc">A routing card wordmark for the just-product-factor repository.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.52" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.24"/>
    </filter>
  </defs>
  <rect width="960" height="260" rx="36" fill="#f8fafc"/>
  <rect x="30" y="30" width="900" height="200" rx="30" fill="url(#panel)" filter="url(#softShadow)"/>
  <g transform="translate(72 68)">
    <rect x="0" y="0" width="124" height="124" rx="28" fill="#f8fafc" opacity="0.98"/>
    <path d="M35 41h54M35 62h54M35 83h34" stroke="#0f172a" stroke-width="8" stroke-linecap="round"/>
    <circle cx="91" cy="84" r="12" fill="url(#accent)"/>
    <path d="M88 84h42M130 42h32M130 84h32" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="170" cy="42" r="11" fill="#38bdf8"/>
    <circle cx="170" cy="84" r="11" fill="#34d399"/>
  </g>
  <g transform="translate(280 78)">
    <text x="0" y="48" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="46" font-weight="800" fill="#ffffff">just-product-factor</text>
    <text x="2" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="600" fill="#cbd5e1">Agent-native review router for product, UI, app, RAG, MCP, CLI, docs, security, and release work.</text>
    <g transform="translate(0 122)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">
      <rect x="0" y="0" width="92" height="30" rx="15" fill="#ecfeff" opacity="0.96"/>
      <text x="18" y="21" fill="#0f766e">UI</text>
      <rect x="104" y="0" width="104" height="30" rx="15" fill="#ecfeff" opacity="0.96"/>
      <text x="128" y="21" fill="#0f766e">App</text>
      <rect x="220" y="0" width="104" height="30" rx="15" fill="#ecfeff" opacity="0.96"/>
      <text x="242" y="21" fill="#0f766e">RAG</text>
      <rect x="336" y="0" width="104" height="30" rx="15" fill="#ecfeff" opacity="0.96"/>
      <text x="358" y="21" fill="#0f766e">MCP</text>
      <rect x="452" y="0" width="104" height="30" rx="15" fill="#ecfeff" opacity="0.96"/>
      <text x="476" y="21" fill="#0f766e">CLI</text>
    </g>
