<svg xmlns="http://www.w3.org/2000/svg" width="760" height="360" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">just-product-factor Factor Router logo</title>
  <desc id="desc">An original README logo showing a checked review document, routing nodes, and a pencil for the just-product-factor skill router.</desc>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eefdf8"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="pencil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="760" height="360" rx="42" fill="url(#cardBg)"/>
  <circle cx="618" cy="78" r="58" fill="#bae6fd" opacity="0.55"/>
  <circle cx="150" cy="258" r="64" fill="#bbf7d0" opacity="0.55"/>
  <circle cx="612" cy="258" r="36" fill="#ccfbf1" opacity="0.75"/>

  <g filter="url(#shadow)">
    <rect x="214" y="54" width="300" height="200" rx="28" fill="#ffffff" stroke="#0f172a" stroke-width="8"/>
    <path d="M248 94h72" stroke="#0f766e" stroke-width="12" stroke-linecap="round"/>
    <path d="M248 126h158" stroke="#0f172a" stroke-width="16" stroke-linecap="round"/>
    <path d="M248 160h190" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
    <path d="M248 184h130" stroke="#e2e8f0" stroke-width="8" stroke-linecap="round"/>
    <rect x="248" y="206" width="56" height="20" rx="10" fill="#dbeafe"/>
    <rect x="316" y="206" width="58" height="20" rx="10" fill="#dcfce7"/>
    <rect x="386" y="206" width="58" height="20" rx="10" fill="#fef3c7"/>
  </g>

  <path d="M190 142c23 1 39 21 49 39 35-55 73-82 118-96" fill="none" stroke="url(#teal)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(494 82) rotate(-14 38 96)" filter="url(#shadow)">
    <rect x="19" y="0" width="38" height="132" rx="18" fill="url(#pencil)" stroke="#0f172a" stroke-width="6"/>
    <path d="M20 121h36l-18 42z" fill="#f8fafc" stroke="#0f172a" stroke-width="6" stroke-linejoin="round"/>
    <path d="M33 153l5 10 5-10z" fill="#0f172a"/>
    <path d="M20 35h36" stroke="#fb923c" stroke-width="6"/>
  </g>

  <g stroke="#0f172a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M118 118h52"/>
    <path d="M590 128h52"/>
    <path d="M118 222h52"/>
    <path d="M590 222h52"/>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800">
    <rect x="70" y="96" width="76" height="44" rx="18" fill="#ecfeff" stroke="#14b8a6" stroke-width="4"/>
    <text x="95" y="124" fill="#0f766e">UI</text>
    <rect x="616" y="106" width="86" height="44" rx="18" fill="#eff6ff" stroke="#3b82f6" stroke-width="4"/>
    <text x="640" y="134" fill="#1d4ed8">APP</text>
    <rect x="70" y="200" width="88" height="44" rx="18" fill="#fefce8" stroke="#eab308" stroke-width="4"/>
    <text x="94" y="228" fill="#854d0e">RAG</text>
    <rect x="616" y="200" width="90" height="44" rx="18" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="4"/>
    <text x="638" y="228" fill="#6d28d9">MCP</text>
