  <g filter="url(#shadow)">
    <rect x="186" y="258" width="388" height="62" rx="18" fill="#0f172a"/>
    <text x="380" y="299" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900" fill="#ffffff" letter-spacing="1.4">FACTOR ROUTER</text>
